name: C Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev groff ruby ruby-dev && sudo gem install ronn --no-document

      - name: Check for Makefile
        run: |
          if [ ! -f Makefile ]; then
            echo "Warning: Makefile not found in the repository root. Please add a Makefile to enable automated build and test steps."
            echo "MAKEFILE_EXISTS=false" >> "$GITHUB_ENV"
          else
            echo "MAKEFILE_EXISTS=true" >> "$GITHUB_ENV"
          fi

      - name: Build
        if: env.MAKEFILE_EXISTS == 'true'
        run: make

      - name: Run tests
        if: env.MAKEFILE_EXISTS == 'true'
        run: make test

      - name: Build static binary
        if: env.MAKEFILE_EXISTS == 'true'
        run: make static

      - name: Verify static binary
        if: env.MAKEFILE_EXISTS == 'true'
        run: |
          file crypto
          if ldd crypto 2>&1 | grep -q "not a dynamic executable"; then
            echo "PASS: Binary is statically linked"
          else
            echo "FAIL: Binary is NOT statically linked"
            exit 1
          fi
          if file crypto | grep -q "stripped"; then
            echo "PASS: Binary is stripped"
          else
            echo "FAIL: Binary is NOT stripped"
            exit 1
          fi
